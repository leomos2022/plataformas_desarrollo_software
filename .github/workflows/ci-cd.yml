name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']

    steps:
    - name: Checkout código
      uses: actions/checkout@v3

    - name: Configurar Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache de dependencias
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Análisis estático con flake8
      run: |
        pip install flake8
        flake8 App/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 App/ --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics

    - name: Verificar formato con black
      run: |
        pip install black
        black --check App/ Tests/

    - name: Escaneo de seguridad con bandit
      run: |
        pip install bandit
        bandit -r App/ -f json -o bandit-report.json
      continue-on-error: true

    - name: Ejecutar pruebas con pytest
      run: |
        pip install pytest pytest-cov
        pytest --cov=App --cov-report=xml --cov-report=html --cov-report=term

    - name: Subir reporte de cobertura a Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

    - name: Verificar vulnerabilidades en dependencias
      run: |
        pip install safety
        safety check --json
      continue-on-error: true

    - name: Subir artefactos de cobertura
      uses: actions/upload-artifact@v3
      with:
        name: coverage-report-${{ matrix.python-version }}
        path: htmlcov/

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Checkout código
      uses: actions/checkout@v3

    - name: Configurar Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login a Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build y Push
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/dev-env:latest
          ${{ secrets.DOCKER_USERNAME }}/dev-env:${{ github.sha }}
        cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/dev-env:buildcache
        cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/dev-env:buildcache,mode=max

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Deploy a servidor
      run: |
        echo "Deploying to production..."
        # Aquí irían los comandos de deployment real
        # Por ejemplo: SSH al servidor y pull de la nueva imagen

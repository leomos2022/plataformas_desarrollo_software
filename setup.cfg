# Pytest Configuration
[tool:pytest]
testpaths = Tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --strict-markers
    --tb=short
    --cov=App
    --cov-report=term-missing
    --cov-report=html

# Coverage Configuration
[coverage:run]
source = App
omit = 
    */tests/*
    */test_*.py
    */__pycache__/*
    */venv/*
    */dev_env/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:

# Flake8 Configuration
[flake8]
max-line-length = 100
exclude = 
    .git,
    __pycache__,
    dev_env,
    venv,
    .venv,
    build,
    dist,
    *.egg-info
ignore = 
    E203,  # whitespace before ':'
    E501,  # line too long (handled by black)
    W503,  # line break before binary operator
